<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    //for - Quando sei quantas vezes quero repetir
    for(var i = 0; i<=10;i++){
        console.log("Audiências" ,i+1)
    }   
    
    //While - Quando repito enquanto algo for verdadeiro
    var j = 100;
    while(j>0){
        console.log("concluir audiências",j);
        j--
    }

    //While 2
    var k = 0;
    while(k<30){
        console.log("Audiência",k+1);
        k++
    }
    //Do...While - Quando preciso garantir uma execução - ex. senha
    var f = 15;
    do{
        console.log("Tentativa de Conciliação",f);
        f--
    }while(f>10)
    </script>
</body>
</html>
